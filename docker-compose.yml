services:
  adu:
    image: ar010731/pages-adu:latest
    platform: linux/amd64
    env_file:
      - ./.env
    environment:
      # .env's MONGODB_URI is written for `pnpm dev` on the host, where
      # "localhost" is Mongo. Inside compose's network, the mongo service
      # must be reached by its service name instead.
      MONGODB_URI: mongodb://mongo:27017/pages-adu
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - minio
    labels:
      - "traefik.http.routers.adu.rule=PathPrefix(`/adu`)"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # config.js is injected at runtime — swap it without rebuilding the image
      - ./config:/app/config
      # target repo checkouts the app edits via the Claude Code CLI
      - ./workdir:/app/workdir

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DIRECTUS_S3_BUCKET: ${DIRECTUS_S3_BUCKET:-directus}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/files;
        mc anonymous set download local/files;
        mc mb --ignore-existing local/${DIRECTUS_S3_BUCKET:-directus};
      "
    restart: on-failure
  directus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
      POSTGRES_DB: ${DIRECTUS_DB_DATABASE:-directus}
    volumes:
      - directus_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DIRECTUS_DB_USER:-directus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-directus}
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: "5432"
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
      MCP_ENABLED: "true"
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost/cms/}
      STORAGE_LOCATIONS: s3
      STORAGE_S3_DRIVER: s3
      STORAGE_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_S3_BUCKET: ${DIRECTUS_S3_BUCKET:-directus}
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_FORCE_PATH_STYLE: "true"
    labels:
      - "traefik.http.routers.cms.rule=PathPrefix(`/cms`)"
      - "traefik.http.middlewares.cms-strip.stripprefix.prefixes=/cms"
      - "traefik.http.routers.cms.middlewares=cms-strip"
    depends_on:
      directus-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  doc-unit:
    image: ar010731/mcpdoc
    volumes:
      - ./mcpdoc/config.yml:/config.yml:ro

volumes:
  mongo_data:
  minio_data:
  directus_db_data:
